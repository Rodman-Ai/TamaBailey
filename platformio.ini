; PlatformIO Project Configuration File
;
; Target: Waveshare ESP32-S3-Touch-LCD-1.54
;   - ESP32-S3 (N16R8: 16 MB flash, 8 MB PSRAM)
;   - 240x240 ST7789 LCD (4-wire SPI)
;   - 3 onboard user buttons (GPIO 0/5/4)
;   - Capacitive touch (CST816 family, I2C) -- optional input
;
; Waveshare does not publish a custom PIO board variant for this product,
; so we target the generic esp32-s3-devkitc-1 and rely on build_flags
; for USB CDC + PSRAM.

[env:esp32-s3-lcd-1_54]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

upload_speed = 921600

; -D BAILEY_FAST_DECAY=1 collapses 12-24h stat decays into 12-24 min for
; rapid testing on hardware. Default is the classic Tamagotchi pace.
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -D BAILEY_FAST_DECAY=0
    -std=gnu++17
build_unflags = -std=gnu++11

board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi

lib_ldf_mode = chain+

lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    mathertel/OneButton@^2.6.1
    lewisxhe/SensorLib@^0.2.0

; Fast-decay variant for hardware demos / kiosks.
[env:esp32-s3-lcd-1_54-fast]
extends = env:esp32-s3-lcd-1_54
build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3
    -D BAILEY_FAST_DECAY=1
    -std=gnu++17
