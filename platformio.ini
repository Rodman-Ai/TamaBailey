; PlatformIO Project Configuration File
;
; Target: Waveshare ESP32-S3 1.54" LCD Development Board
;   - ESP32-S3 (N16R8: 16 MB flash, 8 MB PSRAM)
;   - 240x240 ST7789 LCD (4-wire SPI)
;   - 3 onboard user buttons
;
; Waveshare does not publish a custom PIO board variant for this product,
; so we target the generic esp32-s3-devkitc-1 and rely on build_flags
; for USB CDC + PSRAM.

[env:esp32-s3-lcd-1_54]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

upload_speed = 921600

build_flags =
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=3

board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi

lib_deps =
    lovyan03/LovyanGFX@^1.2.0
